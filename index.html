<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0A0A0F" />
  <title>ScrollStrike</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ── RESET & BASE ─────────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      user-select: none;
    }

    :root {
      --bg:       #0A0A0F;
      --surface:  #1C1C2E;
      --red:      #FF3B5C;
      --lime:     #AAFF00;
      --cyan:     #00E5FF;
      --text:     #FFFFFF;
      --muted:    rgba(255,255,255,0.4);
      --heart-empty: #2A2A3A;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
      --hud-height: calc(var(--safe-top) + 72px);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      touch-action: none;
      overscroll-behavior: none;
    }

    /* ── APP SHELL ────────────────────────────────────────────────── */
    #app {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: stretch;
      background: var(--bg);
    }

    #game-viewport {
      position: relative;
      width: 100%;
      max-width: 390px;
      height: 100dvh;
      overflow: hidden;
      background: var(--bg);
    }

    /* ── SINGLE PERMANENT SLIDE ───────────────────────────────────── */
    #slide-stack {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100dvh;
    }

    .slide {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .game-area {
      position: absolute;
      left: 0;
      right: 0;
      top: var(--hud-height);
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── GAME INSTRUCTION ─────────────────────────────────────────── */
    #game-instruction {
      position: absolute;
      top: 14px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.4);
      pointer-events: none;
      z-index: 50;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #game-instruction.visible {
      opacity: 1;
    }

    @keyframes instruction-fade-out {
      0%   { opacity: 1; }
      80%  { opacity: 1; }
      100% { opacity: 0; }
    }

    #game-instruction.auto-fade {
      animation: instruction-fade-out 2s ease forwards;
    }

    /* ── HUD ──────────────────────────────────────────────────────── */
    #hud {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 100;
    }

    #hud-top {
      position: absolute;
      top: calc(var(--safe-top) + 12px);
      left: 0;
      right: 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 0 16px;
    }

    /* Hearts */
    #hearts {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .heart {
      width: 26px;
      height: 24px;
      position: relative;
      transition: transform 0.2s ease;
    }

    .heart svg {
      width: 100%;
      height: 100%;
    }

    .heart.full svg path  { fill: var(--red); }
    .heart.empty svg path { fill: var(--heart-empty); }

    .heart.lose-anim {
      animation: heart-lose 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97);
    }

    @keyframes heart-lose {
      0%   { transform: scale(1.4); }
      30%  { transform: scale(0.6); }
      60%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    /* Streak */
    #streak-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    #streak-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 0px;
    }

    #streak-count {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      line-height: 1;
      color: var(--text);
      transition: color 0.2s ease;
    }

    #streak-count.bump {
      animation: streak-bump 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes streak-bump {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.4); color: var(--cyan); }
      100% { transform: scale(1); }
    }

    /* Timer */
    #timer-wrap {
      position: absolute;
      bottom: calc(var(--safe-bot) + 16px);
      left: 16px;
      right: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    #timer-bar-track {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    #timer-bar {
      height: 100%;
      width: 100%;
      background: var(--red);
      border-radius: 2px;
      transform-origin: left center;
      transition: transform 0.1s linear, background 0.3s ease;
      will-change: transform;
    }

    #timer-bar.urgent {
      background: #fff;
      animation: timer-pulse 0.4s ease-in-out infinite;
    }

    @keyframes timer-pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.6; }
    }

    #timer-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      color: var(--text);
      line-height: 1;
    }

    /* ── OVERLAYS ─────────────────────────────────────────────────── */
    /*
     * BUG 1 FIX: overlays are position:absolute inset:0 with flex centering.
     * Previously individual game modules were spawning their own overlay divs
     * with position:absolute but without inset:0, causing bottom-right drift.
     * The canonical overlays here are always perfectly centered.
     */
    .overlay {
      position: absolute;
      inset: 0;
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
    }

    .overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    /* Win overlay */
    #win-overlay {
      background: rgba(10, 10, 15, 0.75);
      backdrop-filter: blur(4px);
    }

    #win-overlay .overlay-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 88px;
      color: var(--lime);
      line-height: 1;
      text-align: center;
      text-shadow: 0 0 60px rgba(170, 255, 0, 0.5);
      transform: scale(0.3);
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    #win-overlay.visible .overlay-text {
      transform: scale(1);
    }

    /* Fail overlay */
    #fail-overlay {
      background: rgba(255, 59, 92, 0.15);
      backdrop-filter: blur(2px);
    }

    #fail-overlay .overlay-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 80px;
      color: var(--red);
      line-height: 1;
      text-align: center;
      text-shadow: 0 0 60px rgba(255, 59, 92, 0.7);
      transform: scale(0.3);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    #fail-overlay.visible .overlay-text {
      transform: scale(1);
    }

    /* Flash overlay */
    #flash-overlay {
      background: rgba(0, 229, 255, 0.2);
      pointer-events: none;
      z-index: 300;
      opacity: 0;
      transition: opacity 0.08s ease;
    }

    #flash-overlay.flash {
      opacity: 1;
    }

    /* ── GAME OVER SCREEN ─────────────────────────────────────────── */
    #gameover-screen {
      position: absolute;
      inset: 0;
      z-index: 400;
      background: var(--bg);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 32px 24px;
      padding-top: calc(var(--safe-top) + 32px);
      padding-bottom: calc(var(--safe-bot) + 32px);
    }

    #gameover-screen.visible {
      display: flex;
    }

    .go-eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .go-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 96px;
      color: var(--red);
      line-height: 0.9;
      text-align: center;
      text-shadow: 0 0 80px rgba(255, 59, 92, 0.4);
      margin-bottom: 40px;
      animation: go-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes go-in {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .go-stats {
      display: flex;
      gap: 32px;
      align-items: flex-start;
      margin-bottom: 56px;
    }

    .go-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .go-stat-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .go-stat-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 64px;
      line-height: 1;
      color: var(--text);
    }

    .go-stat-value.cyan { color: var(--cyan); }

    .go-divider {
      width: 1px;
      height: 56px;
      background: rgba(255,255,255,0.1);
      align-self: center;
    }

    #try-again-btn {
      background: var(--red);
      color: var(--text);
      border: none;
      border-radius: 16px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 2px;
      padding: 18px 64px;
      cursor: pointer;
      pointer-events: auto;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 8px 40px rgba(255, 59, 92, 0.4);
      -webkit-appearance: none;
    }

    #try-again-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.15s ease;
    }

    #try-again-btn:active {
      transform: scale(0.95);
      box-shadow: 0 4px 20px rgba(255, 59, 92, 0.3);
    }

    #try-again-btn:active::after {
      background: rgba(255,255,255,0.1);
    }

    /* ── ANIMATIONS ───────────────────────────────────────────────── */
    @keyframes shake {
      0%   { transform: translateX(0); }
      15%  { transform: translateX(-8px); }
      30%  { transform: translateX(8px); }
      45%  { transform: translateX(-8px); }
      60%  { transform: translateX(8px); }
      75%  { transform: translateX(-4px); }
      90%  { transform: translateX(4px); }
      100% { transform: translateX(0); }
    }

    .shaking {
      animation: shake 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
    }

    @keyframes score-pop {
      0%   { transform: translateY(0);     opacity: 1; }
      100% { transform: translateY(-60px); opacity: 0; }
    }

    .score-pop {
      position: absolute;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      color: var(--cyan);
      pointer-events: none;
      z-index: 500;
      animation: score-pop 0.6s ease-out forwards;
      text-shadow: 0 0 20px var(--cyan);
    }

    @keyframes bounce-in {
      0%   { transform: scale(0.3) translateY(40px); opacity: 0; }
      60%  { transform: scale(1.05) translateY(-4px); opacity: 1; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }

    .slide-content-bounce {
      animation: bounce-in 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    /* ── DECORATIVE GRAIN ─────────────────────────────────────────── */
    #grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
    }
  </style>
</head>
<body>

<!-- Grain texture -->
<div id="grain"></div>

<!-- Main app container -->
<div id="app">
  <div id="game-viewport">

    <!-- Single permanent slide -->
    <div id="slide-stack">
      <div class="slide">
        <div class="game-area" id="game-area">
          <div id="game-instruction"></div>
        </div>
      </div>
    </div>

    <!-- HUD -->
    <div id="hud">
      <div id="hud-top">
        <div id="hearts"></div>
        <div id="streak-wrap">
          <span id="streak-label">STREAK</span>
          <span id="streak-count">0</span>
        </div>
      </div>
      <div id="timer-wrap">
        <div id="timer-bar-track">
          <div id="timer-bar"></div>
        </div>
        <span id="timer-number">10</span>
      </div>
    </div>

    <!-- Win overlay -->
    <div id="win-overlay" class="overlay">
      <div class="overlay-text">NICE! 🔥</div>
    </div>

    <!-- Fail overlay -->
    <div id="fail-overlay" class="overlay">
      <div class="overlay-text">FAILED ✗</div>
    </div>

    <!-- Flash overlay -->
    <div id="flash-overlay" class="overlay"></div>

    <!-- Game Over screen -->
    <div id="gameover-screen">
      <span class="go-eyebrow">you're done</span>
      <div class="go-title">GAME<br>OVER</div>
      <div class="go-stats">
        <div class="go-stat">
          <span class="go-stat-label">Streak</span>
          <span class="go-stat-value cyan" id="go-streak">0</span>
        </div>
        <div class="go-divider"></div>
        <div class="go-stat">
          <span class="go-stat-label">Best</span>
          <span class="go-stat-value" id="go-best">0</span>
        </div>
      </div>
      <button id="try-again-btn">TRY AGAIN</button>
    </div>

  </div>
</div>

<script type="module">
'use strict';

import { GameEngine } from '/game-engine.js';

// ─────────────────────────────────────────────────────────────────────────────
// AUDIO ENGINE (Bug 3)
// Web Audio API — all synthesis, no external files.
// AudioContext is created on first user touch (iOS requirement).
// ─────────────────────────────────────────────────────────────────────────────
let _audioCtx = null;
let _audioUnlocked = false;

function _getAudioCtx() {
  if (!_audioCtx) {
    try {
      _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) {
      return null;
    }
  }
  return _audioCtx;
}

function _unlockAudio() {
  if (_audioUnlocked) return;
  _audioUnlocked = true;
  const ctx = _getAudioCtx();
  if (!ctx) return;
  // Play a silent buffer to unlock on iOS
  const buf = ctx.createBuffer(1, 1, 22050);
  const src = ctx.createBufferSource();
  src.buffer = buf;
  src.connect(ctx.destination);
  src.start(0);
  if (ctx.state === 'suspended') ctx.resume();
}

/**
 * Play a tone.
 * @param {number} freq       Hz
 * @param {string} type       OscillatorType
 * @param {number} duration   seconds
 * @param {number} gain       0–1
 * @param {number} startDelay seconds from now
 */
function _playTone(freq, type, duration, gain = 0.18, startDelay = 0) {
  if (!_audioUnlocked) return;
  const ctx = _getAudioCtx();
  if (!ctx) return;
  try {
    const osc = ctx.createOscillator();
    const env = ctx.createGain();
    osc.connect(env);
    env.connect(ctx.destination);

    osc.type      = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime + startDelay);

    env.gain.setValueAtTime(0, ctx.currentTime + startDelay);
    env.gain.linearRampToValueAtTime(gain, ctx.currentTime + startDelay + 0.005);
    env.gain.linearRampToValueAtTime(0,    ctx.currentTime + startDelay + duration);

    osc.start(ctx.currentTime + startDelay);
    osc.stop(ctx.currentTime + startDelay + duration + 0.01);
  } catch (e) { /* non-blocking */ }
}

/**
 * Descending frequency sweep (fail sound).
 */
function _playSweep(freqStart, freqEnd, type, duration, gain = 0.18) {
  if (!_audioUnlocked) return;
  const ctx = _getAudioCtx();
  if (!ctx) return;
  try {
    const osc = ctx.createOscillator();
    const env = ctx.createGain();
    osc.connect(env);
    env.connect(ctx.destination);

    osc.type = type;
    osc.frequency.setValueAtTime(freqStart, ctx.currentTime);
    osc.frequency.linearRampToValueAtTime(freqEnd, ctx.currentTime + duration);

    env.gain.setValueAtTime(0, ctx.currentTime);
    env.gain.linearRampToValueAtTime(gain, ctx.currentTime + 0.01);
    env.gain.linearRampToValueAtTime(0,    ctx.currentTime + duration);

    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration + 0.01);
  } catch (e) { /* non-blocking */ }
}

// ── Named sound events ────────────────────────────────────────────────────────

/** Correct tap: 880 Hz sine, 0.08 s */
export function soundCorrect() {
  _playTone(880, 'sine', 0.08, 0.15);
}

/** Wrong action: 120 Hz sawtooth, 0.15 s */
export function soundWrong() {
  _playTone(120, 'sawtooth', 0.15, 0.20);
}

/** Win: 523 Hz then 784 Hz, 0.12 s each */
export function soundWin() {
  _playTone(523, 'sine', 0.12, 0.18, 0);
  _playTone(784, 'sine', 0.12, 0.18, 0.13);
}

/** Fail: descending sweep 300 → 150 Hz, 0.2 s */
export function soundFail() {
  _playSweep(300, 150, 'sawtooth', 0.20, 0.18);
}

/** Game over: three descending tones */
export function soundGameOver() {
  _playTone(400, 'sine', 0.15, 0.20, 0);
  _playTone(300, 'sine', 0.15, 0.20, 0.18);
  _playTone(200, 'sine', 0.20, 0.20, 0.36);
}

/** Timer urgent tick: 440 Hz sine, 0.05 s */
export function soundTick() {
  _playTone(440, 'sine', 0.05, 0.10);
}

// Expose to game modules via window so they don't need to import index.html
window.SS_SOUND = {
  correct:   soundCorrect,
  wrong:     soundWrong,
  win:       soundWin,
  fail:      soundFail,
  gameOver:  soundGameOver,
  tick:      soundTick,
};

// ─────────────────────────────────────────────────────────────────────────────
// DOM REFS
// ─────────────────────────────────────────────────────────────────────────────
const viewport       = document.getElementById('game-viewport');
const gameArea       = document.getElementById('game-area');
const heartsEl       = document.getElementById('hearts');
const streakEl       = document.getElementById('streak-count');
const timerBarEl     = document.getElementById('timer-bar');
const timerNumEl     = document.getElementById('timer-number');
const timerWrapEl    = document.getElementById('timer-wrap');
const winOverlay     = document.getElementById('win-overlay');
const failOverlay    = document.getElementById('fail-overlay');
const flashOverlay   = document.getElementById('flash-overlay');
const gameoverScreen = document.getElementById('gameover-screen');
const goStreakEl     = document.getElementById('go-streak');
const goBestEl       = document.getElementById('go-best');
const tryAgainBtn    = document.getElementById('try-again-btn');

// ─────────────────────────────────────────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────────────────────────────────────────
const GAME_DURATION  = 10;
const TIMER_URGENT_S = 3;

// ─────────────────────────────────────────────────────────────────────────────
// TIMER
// ─────────────────────────────────────────────────────────────────────────────
let timerInterval   = null;
let timerSeconds    = GAME_DURATION;
let _tickPlayed     = false; // guard so tick sound fires once per urgent phase

function startTimer() {
  clearInterval(timerInterval);
  timerSeconds = GAME_DURATION;
  _tickPlayed  = false;
  timerBarEl.style.transform = 'scaleX(1)';
  timerBarEl.classList.remove('urgent');
  timerNumEl.textContent = timerSeconds;
  timerWrapEl.style.opacity = '1';

  timerInterval = setInterval(() => {
    timerSeconds--;
    const fraction = timerSeconds / GAME_DURATION;
    timerBarEl.style.transform = `scaleX(${Math.max(0, fraction)})`;
    timerNumEl.textContent = Math.max(0, timerSeconds);

    if (timerSeconds <= TIMER_URGENT_S && timerSeconds > 0) {
      timerBarEl.classList.add('urgent');
      // Play tick once when urgency phase starts (Bug 3)
      if (!_tickPlayed) {
        _tickPlayed = true;
        soundTick();
      }
    }

    if (timerSeconds <= 0) {
      clearInterval(timerInterval);
    }
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
}

function hideTimer() {
  stopTimer();
  timerBarEl.style.transform = 'scaleX(0)';
  timerNumEl.textContent = '';
  timerBarEl.classList.remove('urgent');
  timerWrapEl.style.opacity = '0';
}

// ─────────────────────────────────────────────────────────────────────────────
// HEARTS
// ─────────────────────────────────────────────────────────────────────────────
function heartSVG() {
  return `<svg viewBox="0 0 24 22" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5
             2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09
             C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5
             c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
  </svg>`;
}

function renderHearts(lives) {
  heartsEl.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const h = document.createElement('div');
    h.classList.add('heart', i < lives ? 'full' : 'empty');
    h.setAttribute('data-index', i);
    h.innerHTML = heartSVG();
    heartsEl.appendChild(h);
  }
}

function animateHeartLoss(lives) {
  const heartEls = heartsEl.querySelectorAll('.heart');
  const targetIdx = lives;
  if (heartEls[targetIdx]) {
    heartEls[targetIdx].classList.remove('lose-anim');
    void heartEls[targetIdx].offsetWidth;
    heartEls[targetIdx].classList.add('lose-anim');
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// STREAK
// ─────────────────────────────────────────────────────────────────────────────
function renderStreak(streak) {
  streakEl.textContent = streak;
  streakEl.classList.remove('bump');
  void streakEl.offsetWidth;
  streakEl.classList.add('bump');
  setTimeout(() => streakEl.classList.remove('bump'), 350);
}

// ─────────────────────────────────────────────────────────────────────────────
// ANIMATIONS
// ─────────────────────────────────────────────────────────────────────────────
function shakeScreen() {
  viewport.classList.remove('shaking');
  void viewport.offsetWidth;
  viewport.classList.add('shaking');
  setTimeout(() => viewport.classList.remove('shaking'), 450);
}

function flashCyan() {
  flashOverlay.classList.add('flash');
  setTimeout(() => flashOverlay.classList.remove('flash'), 150);
}

// ─────────────────────────────────────────────────────────────────────────────
// ENGINE CALLBACKS
// ─────────────────────────────────────────────────────────────────────────────

function onWin(streak) {
  stopTimer();
  hideTimer();
  flashCyan();
  renderStreak(streak);
  soundWin(); // Bug 3

  winOverlay.classList.add('visible');
  setTimeout(() => winOverlay.classList.remove('visible'), 750);
}

function onFail(lives) {
  stopTimer();
  hideTimer();
  shakeScreen();
  animateHeartLoss(lives);
  renderHearts(lives);
  renderStreak(0);
  soundFail(); // Bug 3

  failOverlay.classList.add('visible');
  setTimeout(() => failOverlay.classList.remove('visible'), 1150);
}

function showGameOver(bestStreak, _streak) {
  stopTimer();
  hideTimer();
  soundGameOver(); // Bug 3

  const finalStreak = parseInt(streakEl.textContent, 10) || 0;

  goStreakEl.textContent = finalStreak;
  goBestEl.textContent   = Math.max(finalStreak, bestStreak);

  gameoverScreen.classList.add('visible');
}

function onGameStart() {
  startTimer();
}

// ─────────────────────────────────────────────────────────────────────────────
// ENGINE INSTANCE
// ─────────────────────────────────────────────────────────────────────────────
const engine = new GameEngine(gameArea, { onWin, onFail, showGameOver, onGameStart });

// ─────────────────────────────────────────────────────────────────────────────
// TOUCH — unlock audio on first touch, prevent scroll / double-tap zoom
// ─────────────────────────────────────────────────────────────────────────────
viewport.addEventListener('touchstart', (e) => {
  _unlockAudio(); // Bug 3 — iOS requires user gesture before AudioContext
  e.preventDefault();
}, { passive: false });

viewport.addEventListener('touchmove', (e) => {
  e.preventDefault();
}, { passive: false });

let lastTapTime = 0;
viewport.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - lastTapTime < 300) {
    e.preventDefault();
  }
  lastTapTime = now;
}, { passive: false });

// ─────────────────────────────────────────────────────────────────────────────
// TRY AGAIN
// ─────────────────────────────────────────────────────────────────────────────
tryAgainBtn.addEventListener('touchstart', (e) => {
  e.stopPropagation();
}, { passive: false });

tryAgainBtn.addEventListener('touchend', (e) => {
  e.preventDefault();
  e.stopPropagation();

  gameoverScreen.classList.remove('visible');
  winOverlay.classList.remove('visible');
  failOverlay.classList.remove('visible');
  flashOverlay.classList.remove('flash');

  renderHearts(3);
  renderStreak(0);
  hideTimer();

  engine.reset();
}, { passive: false });

// ─────────────────────────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────────────────────────
renderHearts(3);
renderStreak(0);
hideTimer();
engine.start();
</script>
</body>
</html>
